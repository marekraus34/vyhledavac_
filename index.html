<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1F6FB2">
<meta name="mobile-web-app-capable" content="yes">
<title>Vyhledávač zařízení</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#E7E4DD;
    --surface:#FAF9F6;
    --ink:#20242A;
    --ink-soft:#5C6168;
    --cobalt:#1F6FB2;
    --cobalt-dark:#18568C;
    --cobalt-bg:#E7F0F7;
    --amber:#E0962B;
    --amber-dark:#B97318;
    --green:#4F8F5B;
    --green-bg:#E7F1E8;
    --rust:#B6432E;
    --rust-bg:#F5E6E2;
    --border:#D8D4CB;
    --radius:14px;
    --font-display:'Bebas Neue', sans-serif;
    --font-body:'IBM Plex Sans', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-tap-highlight-color:transparent;
    min-height:100vh;
  }
  .app-shell{max-width:480px;margin:0 auto;min-height:100vh;padding:0 18px 40px;}
  .app-header{display:flex;align-items:center;justify-content:center;padding:24px 0 18px;}
  .brand{font-family:var(--font-display);font-size:23px;letter-spacing:.03em;}
  
  .muted{color:var(--ink-soft);font-size:14px;line-height:1.55;}
  h1{font-family:var(--font-display);font-weight:400;font-size:27px;letter-spacing:.02em;margin:0 0 8px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 22px;border-radius:10px;font-family:var(--font-body);font-weight:600;font-size:15px;border:none;cursor:pointer;text-decoration:none;}
  .btn:focus-visible{outline:2px solid var(--cobalt);outline-offset:2px;}
  .btn-secondary{background:var(--surface);color:var(--ink);border:1px solid var(--border);}

  /* toggle */
  .toggle-row{margin-bottom:24px;}
  .toggle-label{display:block;font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.07em;color:var(--ink-soft);margin-bottom:8px;}
  .segmented{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:4px;}
  .seg-btn{flex:1;border:none;background:transparent;padding:11px 6px;font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--ink-soft);border-radius:8px;cursor:pointer;}
  .seg-btn:focus-visible{outline:2px solid var(--cobalt);outline-offset:2px;}
  .seg-btn.active{background:var(--cobalt);color:#fff;}

  /* mic */
  .mic-zone{text-align:center;margin:18px 0 22px;}
  .radar{position:relative;display:flex;align-items:center;justify-content:center;width:152px;height:152px;margin:0 auto;}
  .radar::before,.radar::after{content:'';position:absolute;border-radius:50%;border:2px solid var(--amber);opacity:0;width:100%;height:100%;}
  .radar.listening::before{animation:pulse 1.7s ease-out infinite;}
  .radar.listening::after{animation:pulse 1.7s ease-out infinite;animation-delay:.55s;}
  @keyframes pulse{0%{transform:scale(.5);opacity:.65;}100%{transform:scale(1.18);opacity:0;}}
  @media (prefers-reduced-motion: reduce){.radar.listening::before,.radar.listening::after{animation:none;opacity:.3;}}
  .mic-btn{position:relative;z-index:1;width:92px;height:92px;border-radius:50%;border:none;background:var(--amber);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 var(--amber-dark), 0 6px 14px rgba(0,0,0,.22);cursor:pointer;transition:transform .12s ease, background .15s ease, box-shadow .12s ease;}
  .mic-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--amber-dark), 0 2px 6px rgba(0,0,0,.18);}
  .mic-btn:focus-visible{outline:2px solid var(--ink);outline-offset:3px;}
  .mic-btn:disabled{background:#B9C4CC;box-shadow:none;cursor:not-allowed;}
  .radar.listening .mic-btn{background:var(--cobalt);box-shadow:0 4px 0 var(--cobalt-dark), 0 6px 14px rgba(0,0,0,.22);}
  .mic-status{font-family:var(--font-body);font-weight:600;font-size:14px;margin-top:16px;color:var(--ink-soft);min-height:18px;}
  .live-transcript{font-family:var(--font-mono);font-size:15px;margin-top:4px;min-height:20px;color:var(--ink);}

  /* manual search */
  .manual-form{display:flex;gap:8px;margin:4px 0 22px;}
  .text-input{flex:1;min-width:0;padding:12px 14px;border-radius:10px;border:1px solid var(--border);font-family:var(--font-body);font-size:14px;background:var(--surface);color:var(--ink);}
  .text-input:focus-visible{outline:2px solid var(--cobalt);outline-offset:2px;}

  /* result */
  .result-panel{min-height:4px;}
  .tag-query{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-soft);margin-bottom:4px;}
  .tag-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 20px 18px;position:relative;overflow:hidden;animation:reveal .35s ease;}
  .tag-card::before{content:'';position:absolute;top:50%;left:0;width:14px;height:14px;border-radius:50%;background:var(--bg);border:1px solid var(--border);transform:translate(-50%,-50%);}
  @keyframes reveal{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .tag-name{font-family:var(--font-body);font-weight:700;font-size:21px;line-height:1.25;margin:2px 0 8px;}
  .tag-line{display:inline-block;font-family:var(--font-body);font-size:12.5px;font-weight:600;color:var(--cobalt-dark);background:var(--cobalt-bg);padding:4px 11px;border-radius:20px;}
  .tag-divider{border:none;border-top:1px dashed var(--border);margin:16px 0 14px;}
  .tag-meta{display:flex;gap:22px;flex-wrap:wrap;}
  .tag-meta div{flex:1;min-width:110px;}
  .tag-meta b{display:block;font-family:var(--font-body);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:3px;}
  .tag-meta span{font-family:var(--font-mono);font-size:13.5px;color:var(--ink);word-break:break-word;}

  .suggestion-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .suggestion-item{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:left;cursor:pointer;font-family:var(--font-body);width:100%;}
  .suggestion-item:focus-visible{outline:2px solid var(--cobalt);outline-offset:2px;}
  .suggestion-item .code{font-family:var(--font-mono);font-weight:700;font-size:13.5px;white-space:nowrap;}
  .suggestion-item .name{font-size:12.5px;color:var(--ink-soft);text-align:right;}

  .not-found{background:var(--rust-bg);border:1px solid var(--rust);color:#7A2E1D;border-radius:var(--radius);padding:16px;font-family:var(--font-body);font-size:13.5px;line-height:1.5;}

  .dataset-info{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:22px;}
</style>
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <span class="brand">VYHLEDÁVAČ ZAŘÍZENÍ</span>
  </header>

  <main id="screenSearch">
    <div class="toggle-row">
      <span class="toggle-label">HLEDAT PODLE</span>
      <div class="segmented" id="columnToggle">
        <button type="button" class="seg-btn" data-col="A">STARÉ Č. (A)</button>
        <button type="button" class="seg-btn active" data-col="B">NOVÉ Č. (B)</button>
      </div>
    </div>

    <div class="mic-zone">
      <div class="radar" id="radar">
        <button id="micBtn" class="mic-btn" aria-label="Spustit hlasové zadávání">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V20H9a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2h-2v-2.08A7 7 0 0 0 19 11z"/></svg>
        </button>
      </div>
      <p id="micStatus" class="mic-status">Klepni a řekni kód</p>
      <p id="liveTranscript" class="live-transcript"></p>
    </div>

    <form id="manualForm" class="manual-form">
      <input type="text" id="manualInput" placeholder="…nebo napiš kód ručně" class="text-input" autocomplete="off">
      <button type="submit" class="btn btn-secondary">Hledat</button>
    </form>

    <div id="resultPanel" class="result-panel"></div>

    <p class="dataset-info" id="datasetInfo"></p>
  </main>

</div>

  // =========================================================

  // ---------- state ----------
  var dataset = [];
  var searchColumn = 'B';
  var recognition = null;

  // ---------- utils ----------
  function escapeHtml(str){
    if(str===null||str===undefined) return '';
    return str.toString().replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function normalize(s){
    if(s===null||s===undefined) return '';
    var n = s.toString().toLowerCase();
    if(n.normalize){ n = n.normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
    return n.replace(/[\s\-_.]/g,'');
  }

  function levenshtein(a,b){
    var m=a.length,n=b.length;
    if(m===0) return n;
    if(n===0) return m;
    var dp=[]; 
    for(var i=0;i<=m;i++){ dp.push(new Array(n+1).fill(0)); dp[i][0]=i; }
    for(var j=0;j<=n;j++){ dp[0][j]=j; }
    for(i=1;i<=m;i++){
      for(j=1;j<=n;j++){
        dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j-1],dp[i-1][j],dp[i][j-1]);
      }
    }
    return dp[m][n];
  }

  // ---------- parse hardcoded data ----------
  function loadHardcodedData(){
    try {
      // Využití SheetJS na rozebrání textového CSV (stejně bezpečné na uvozovky/čárky jako při uploadu)
      var workbook = XLSX.read(rawCSV, {type: 'string'});
      var sheetName = workbook.SheetNames[0];
      var sheet = workbook.Sheets[sheetName];
      var rawRows = XLSX.utils.sheet_to_json(sheet, {header:1, raw:false, defval:''});
      
      dataset = [];
      for(var i=0; i<rawRows.length; i++){
        var r = rawRows[i];
        
        // Přeskočit úplně prázdné řádky
        if(!r || r.every(function(c){ return c===null||c===undefined||c.toString().trim()===''; })) continue;
        
        // Přeskočit hlavičku (detekce podle obvyklých slov v prvním sloupci)
        var firstCol = (r[0]||'').toString().toLowerCase();
        if(firstCol.includes('item no') || firstCol.includes('staré') || firstCol.includes('stare')) continue;

        dataset.push({
          A: (r[0]!==undefined && r[0]!==null) ? r[0].toString().trim() : '',
          B: (r[1]!==undefined && r[1]!==null) ? r[1].toString().trim() : '',
          C: (r[2]!==undefined && r[2]!==null) ? r[2].toString().trim() : '',
          D: (r[3]!==undefined && r[3]!==null) ? r[3].toString().trim() : '',
          E: (r[4]!==undefined && r[4]!==null) ? r[4].toString().trim() : '',
          F: (r[5]!==undefined && r[5]!==null) ? r[5].toString().trim() : ''
        });
      }

      document.getElementById('datasetInfo').textContent = 'Načteno '+dataset.length+' záznamů. Sloupce: A staré číslo · B nové číslo · C název · D linka · E materiál · F charakteristika.';
    } catch(err) {
      document.getElementById('datasetInfo').textContent = 'Chyba při parsování dat. Zkontroluj CSV text.';
      document.getElementById('datasetInfo').style.color = 'var(--rust)';
    }
  }

  // ---------- search ----------
  function searchDataset(query, column){
    var nq = normalize(query);
    if(!nq) return {exact:null, partial:[], query:query, fuzzy:false};
    var exact = null;
    var partial = [];
    for(var k=0;k<dataset.length;k++){
      var row = dataset[k];
      var val = normalize(row[column]);
      if(!val) continue;
      if(val===nq){ exact = row; break; }
      if(val.indexOf(nq)!==-1 || nq.indexOf(val)!==-1){ partial.push(row); }
    }
    if(exact) return {exact:exact, partial:[], query:query, fuzzy:false};
    if(partial.length===0){
      var scored = dataset
        .filter(function(row){ return row[column]; })
        .map(function(row){ return {row:row, dist:levenshtein(normalize(row[column]), nq)}; })
        .sort(function(a,b){ return a.dist-b.dist; });
      var threshold = Math.max(2, Math.ceil(nq.length*0.4));
      var close = scored.filter(function(x){ return x.dist<=threshold; }).slice(0,6).map(function(x){ return x.row; });
      return {exact:null, partial:close, query:query, fuzzy:true};
    }
    return {exact:null, partial:partial.slice(0,6), query:query, fuzzy:false};
  }

  function performSearch(query){
    var result = searchDataset(query, searchColumn);
    renderResult(result);
  }

  // ---------- result rendering ----------
  function tagHtml(row, query){
    var html = '<div class="tag-query">Hledáno: "'+escapeHtml(query)+'"</div>';
    html += '<div class="tag-card">';
    html += '<div class="tag-name">'+(escapeHtml(row.C) || '—')+'</div>';
    if(row.D && row.D !== '-'){ html += '<span class="tag-line">'+escapeHtml(row.D)+'</span>'; }
    html += '<hr class="tag-divider">';
    html += '<div class="tag-meta">';
    html += '<div><b>Materiál</b><span>'+(escapeHtml(row.E) || '—')+'</span></div>';
    html += '<div><b>Charakteristika</b><span>'+(escapeHtml(row.F) || '—')+'</span></div>';
    html += '</div></div>';
    return html;
  }

  function suggestionsHtml(rows, query, fuzzy){
    var heading = fuzzy ? 'Přesně jsem to nenašel. Možná jsi myslel/a:' : 'Našel jsem víc shod:';
    var html = '<div class="tag-query">Hledáno: "'+escapeHtml(query)+'"</div>';
    html += '<p class="muted" style="margin:6px 0 10px;">'+heading+'</p>';
    html += '<div class="suggestion-list">';
    rows.forEach(function(r, i){
      html += '<button type="button" class="suggestion-item" data-idx="'+i+'"><span class="code">'+escapeHtml(r[searchColumn])+'</span><span class="name">'+escapeHtml(r.C)+'</span></button>';
    });
    html += '</div>';
    return html;
  }

  function notFoundHtml(query){
    return '<div class="not-found">Nenašel jsem žádné zařízení pro „'+escapeHtml(query)+'“. Zkus to znovu, přepni sloupec A/B, nebo zkontroluj kód.</div>';
  }

  function renderResult(result){
    var panel = document.getElementById('resultPanel');
    if(result.exact){
      panel.innerHTML = tagHtml(result.exact, result.query);
    }else if(result.partial && result.partial.length>0){
      panel.innerHTML = suggestionsHtml(result.partial, result.query, result.fuzzy);
      panel.querySelectorAll('.suggestion-item').forEach(function(el){
        el.addEventListener('click', function(){
          var idx = parseInt(el.getAttribute('data-idx'),10);
          panel.innerHTML = tagHtml(result.partial[idx], result.query);
        });
      });
    }else{
      panel.innerHTML = notFoundHtml(result.query);
    }
  }

  // ---------- speech recognition ----------
  function setupRecognition(){
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){
      document.getElementById('micStatus').textContent = 'Hlasové zadávání tu není podporované. Zkus to v Chromu, nebo napiš kód ručně.';
      document.getElementById('micBtn').disabled = true;
      return;
    }
    recognition = new SR();
    recognition.lang = 'cs-CZ';
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;
  }

  var ERROR_MESSAGES = {
    'no-speech': 'Nic jsem neslyšel. Zkus to znovu.',
    'not-allowed': 'Přístup k mikrofonu je zablokovaný. Povol ho v nastavení prohlížeče.',
    'permission-denied': 'Přístup k mikrofonu je zablokovaný. Povol ho v nastavení prohlížeče.',
    'audio-capture': 'Nenašel jsem mikrofon.',
    'network': 'Problém s připojením k internetu — hlasové rozpoznávání ho potřebuje.'
  };

  function setListeningUI(isListening){
    var radar = document.getElementById('radar');
    var status = document.getElementById('micStatus');
    var live = document.getElementById('liveTranscript');
    if(isListening){
      radar.classList.add('listening');
      status.textContent = 'Poslouchám…';
      live.textContent = '';
    }else{
      radar.classList.remove('listening');
      status.textContent = 'Klepni a řekni kód';
    }
  }

  function startListening(){
    if(!recognition) return;
    setListeningUI(true);
    var finalTranscript = '';
    recognition.onresult = function(event){
      var interim = '';
      for(var i=event.resultIndex; i<event.results.length; i++){
        var transcript = event.results[i][0].transcript;
        if(event.results[i].isFinal){ finalTranscript += transcript; }
        else{ interim += transcript; }
      }
      document.getElementById('liveTranscript').textContent = finalTranscript || interim;
    };
    recognition.onerror = function(event){
      setListeningUI(false);
      document.getElementById('micStatus').textContent = ERROR_MESSAGES[event.error] || 'Hlasové zadávání se nepovedlo. Zkus to znovu nebo napiš kód ručně.';
    };
    recognition.onend = function(){
      setListeningUI(false);
      if(finalTranscript.trim()){
        performSearch(finalTranscript.trim());
      }
    };
    try{
      recognition.start();
    }catch(e){
      setListeningUI(false);
    }
  }

  // ---------- wiring ----------
  function init(){
    loadHardcodedData();
    setupRecognition();

    document.querySelectorAll('.seg-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        document.querySelectorAll('.seg-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        searchColumn = btn.getAttribute('data-col');
      });
    });

    document.getElementById('micBtn').addEventListener('click', function(){
      var radar = document.getElementById('radar');
      if(radar.classList.contains('listening')){
        if(recognition) recognition.stop();
        return;
      }
      startListening();
    });

    document.getElementById('manualForm').addEventListener('submit', function(e){
      e.preventDefault();
      var input = document.getElementById('manualInput');
      var val = input.value.trim();
      if(val){ performSearch(val); }
    });
  }

  init();
})();
